<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Desafio Fetch API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 300px;
      margin-bottom: 20px;
    }

    .usuario {
      border: 1px solid #ccc;
      padding: 10px;
      margin: 10px 0;
      cursor: pointer;
    }

    .usuario:hover {
      background: #f5f5f5;
    }

    #detalhes {
      margin-top: 20px;
      padding: 15px;
      border: 2px solid #333;
    }
  </style>
</head>
<body>

  <h1>Sistema Completo de Usuários</h1>

  <input type="text" id="busca" placeholder="Buscar usuário pelo nome">

  <p id="loading">Carregando...</p>
  <p id="erro"></p>

  <div id="usuarios"></div>
  <div id="detalhes"></div>

  <script src="script.js"></script>
</body>
</html>
